name: face_condition_detector
description: Real-time face condition detection app with emotion and lighting analysis.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 1. State Management
  get: ^4.6.5

  # 2. Camera & ML Kit
  camera: ^0.10.6
  google_mlkit_face_detection: ^0.11.1
  image_picker: ^1.0.0

  # 3. Permissions
  permission_handler: ^11.4.0

  # 4. Image Processing
  image: ^4.0.17

  # 5. Storage
  shared_preferences: ^2.2.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
